<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="180" y2="180">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    
    <!-- VIP seat gradient -->
    <linearGradient id="vipGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    
    <!-- Premium seat gradient -->
    <linearGradient id="premiumGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    
    <!-- Regular seat gradient -->
    <linearGradient id="regularGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    
    <!-- Screen glow -->
    <linearGradient id="screenGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fbbf24" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Seat shadow -->
    <filter id="seatShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    
    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <!-- Clip path for rounded corners -->
    <clipPath id="rounded">
      <rect width="180" height="180" rx="40"/>
    </clipPath>
  </defs>
  
  <g clip-path="url(#rounded)">
    <!-- Background -->
    <rect fill="url(#bgGrad)" width="180" height="180"/>
    
    <!-- Ambient light rays from screen -->
    <path d="M 90 45 L 30 140 L 45 140 Z" fill="#fbbf24" opacity="0.03"/>
    <path d="M 90 45 L 65 140 L 80 140 Z" fill="#fbbf24" opacity="0.04"/>
    <path d="M 90 45 L 100 140 L 115 140 Z" fill="#fbbf24" opacity="0.04"/>
    <path d="M 90 45 L 135 140 L 150 140 Z" fill="#fbbf24" opacity="0.03"/>
    
    <!-- Cinema screen with curve -->
    <path d="M 20 38 Q 90 25 160 38 L 160 46 Q 90 33 20 46 Z" fill="#e5e7eb" opacity="0.9"/>
    
    <!-- Screen glow line -->
    <path d="M 20 38 Q 90 25 160 38" stroke="url(#screenGlow)" stroke-width="3" fill="none" filter="url(#glow)"/>
    
    <!-- VIP Seats - Premium gold (Row A-B) -->
    <g filter="url(#seatShadow)">
      <rect fill="url(#vipGrad)" x="48" y="60" width="22" height="18" rx="5"/>
      <rect fill="url(#vipGrad)" x="110" y="60" width="22" height="18" rx="5"/>
      <!-- Seat backrest highlights -->
      <rect fill="#fcd34d" x="50" y="62" width="18" height="6" rx="3" opacity="0.6"/>
      <rect fill="#fcd34d" x="112" y="62" width="18" height="6" rx="3" opacity="0.6"/>
    </g>
    
    <!-- Premium Seats - Blue (Row C-D) -->
    <g filter="url(#seatShadow)">
      <rect fill="url(#premiumGrad)" x="34" y="84" width="20" height="18" rx="5"/>
      <rect fill="url(#premiumGrad)" x="80" y="84" width="20" height="18" rx="5"/>
      <rect fill="url(#premiumGrad)" x="126" y="84" width="20" height="18" rx="5"/>
      <!-- Seat backrest highlights -->
      <rect fill="#93c5fd" x="36" y="86" width="16" height="6" rx="3" opacity="0.6"/>
      <rect fill="#93c5fd" x="82" y="86" width="16" height="6" rx="3" opacity="0.6"/>
      <rect fill="#93c5fd" x="128" y="86" width="16" height="6" rx="3" opacity="0.6"/>
    </g>
    
    <!-- Regular Seats - Slate (Row E-G) -->
    <g filter="url(#seatShadow)">
      <rect fill="url(#regularGrad)" x="26" y="108" width="18" height="18" rx="5"/>
      <rect fill="url(#regularGrad)" x="52" y="108" width="18" height="18" rx="5"/>
      <rect fill="url(#regularGrad)" x="110" y="108" width="18" height="18" rx="5"/>
      <rect fill="url(#regularGrad)" x="136" y="108" width="18" height="18" rx="5"/>
      <!-- Seat backrest highlights -->
      <rect fill="#cbd5e1" x="28" y="110" width="14" height="6" rx="3" opacity="0.5"/>
      <rect fill="#cbd5e1" x="54" y="110" width="14" height="6" rx="3" opacity="0.5"/>
      <rect fill="#cbd5e1" x="112" y="110" width="14" height="6" rx="3" opacity="0.5"/>
      <rect fill="#cbd5e1" x="138" y="110" width="14" height="6" rx="3" opacity="0.5"/>
    </g>
    
    <!-- Center aisle with dots -->
    <line x1="90" y1="58" x2="90" y2="130" stroke="#fbbf24" stroke-width="2" opacity="0.3" stroke-dasharray="3 5"/>
    
    <!-- Side aisle markers -->
    <circle cx="22" cy="95" r="2" fill="#60a5fa" opacity="0.4"/>
    <circle cx="158" cy="95" r="2" fill="#60a5fa" opacity="0.4"/>
    
    <!-- Star/sparkle accents -->
    <path d="M 35 55 L 37 50 L 39 55 L 44 57 L 39 59 L 37 64 L 35 59 L 30 57 Z" fill="#fbbf24" opacity="0.6"/>
    <path d="M 145 70 L 146.5 66 L 148 70 L 152 71.5 L 148 73 L 146.5 77 L 145 73 L 141 71.5 Z" fill="#fbbf24" opacity="0.5"/>
  </g>
</svg>